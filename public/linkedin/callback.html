<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn OAuth Callback</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #0077B5 0%, #004182 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Completing LinkedIn Connection...</h2>
        <p>Please return to the app and enter the authorization code.</p>
        <p style="font-size: 0.9em; opacity: 0.8; margin-top: 2rem;">
            If you don't see the code, check the URL above.
        </p>
    </div>
    
    <script>
        // Extract authorization code from URL
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const error = urlParams.get('error');
        const state = urlParams.get('state');
        
        if (error) {
            document.querySelector('h2').textContent = 'Authorization Error';
            document.querySelector('p').textContent = 'Error: ' + error;
            document.querySelector('.spinner').style.display = 'none';
        } else if (code) {
            // Display the code prominently for user to copy
            const codeDisplay = document.createElement('div');
            codeDisplay.style.cssText = 'background: rgba(255,255,255,0.2); padding: 1rem; border-radius: 8px; margin: 1rem 0; font-family: monospace; font-size: 1.2em; word-break: break-all;';
            codeDisplay.textContent = 'Authorization Code: ' + code;
            document.querySelector('.container').appendChild(codeDisplay);
            
            const instructions = document.createElement('p');
            instructions.style.cssText = 'margin-top: 1rem; font-size: 0.9em;';
            instructions.textContent = 'Copy this code and paste it in the app when prompted.';
            document.querySelector('.container').appendChild(instructions);
        }
    </script>
</body>
</html>
